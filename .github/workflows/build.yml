name: Build IPA

"on":
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build llama.xcframework
        run: |
          cp build-xcframework_cpu.sh llmfarm_core.swift/llama.cpp/
          cd llmfarm_core.swift/llama.cpp
          chmod +x build-xcframework_cpu.sh
          bash build-xcframework_cpu.sh

      - name: Show schemes
        run: xcodebuild -list -project LLMFarm.xcodeproj

      - name: Build archive
        run: |
          xcodebuild archive \
            -project LLMFarm.xcodeproj \
            -scheme LLMFarm_Release \
            -configuration Release \
            -archivePath ./build/LLMFarm.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            APP_INTENTS_DEPLOYMENT_POSTPROCESSING=NO \
            SKIP_INSTALL=NO
            
      - name: Package IPA
        run: |
          mkdir -p ./build/Payload
          cp -r ./build/LLMFarm.xcarchive/Products/Applications/LLMFarm.app ./build/Payload/
          cd ./build
          zip -r LLMFarm.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLMFarm-IPA
          path: ./build/LLMFarm.ipa
