name: Build IPA

"on":
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build llama.xcframework
        run: |
          cp build-xcframework_cpu.sh llmfarm_core.swift/llama.cpp/
          cd llmfarm_core.swift/llama.cpp
          chmod +x build-xcframework_cpu.sh
          bash build-xcframework_cpu.sh

      - name: Fix LLMFarmShortcuts
        run: |
          cat > LLMFarm/Intents/LLMFarmShortcuts.swift << 'EOF'
          import AppIntents

          struct LLMFarmShortcuts: AppShortcutsProvider {
              static var appShortcuts: [AppShortcut] {
                  return [AppShortcut]()
              }
          }
          EOF

      - name: Patch - remove ExtractAppIntentsMetadata
        run: |
          python3 << 'EOF'
          import re, glob

          for pbxproj in glob.glob('**/*.xcodeproj/project.pbxproj', recursive=True):
              with open(pbxproj, 'r') as f:
                  content = f.read()
              keys = re.findall(r'([0-9A-Fa-f]{24}) /\* Extract App Intents Metadata \*/', content)
              for key in keys:
                  content = re.sub(
                      r'\s*' + key + r'\s*/\*\s*Extract App Intents Metadata\s*\*/\s*=\s*\{[^}]*\};',
                      '', content, flags=re.DOTALL)
                  content = re.sub(
                      r'\s*' + key + r'\s*/\*\s*Extract App Intents Metadata\s*\*/\s*,',
                      '', content)
              with open(pbxproj, 'w') as f:
                  f.write(content)
              print(f'{pbxproj}: removed {len(keys)} phase(s)')
          EOF

      - name: Patch ChatView - add voice button
        run: |
          python3 << 'EOF'
          with open('LLMFarm/Chats/ChatView.swift', 'r') as f:
              content = f.read()

          content = content.replace(
              '@State private var enableRAG = false',
              '@State private var enableRAG = false\n    @State private var showVoiceChat = false'
          )

          old_btn = '            Button {\n                Task {\n                    toggleEditChat = true\n                    editChatDialog = true\n                }\n            } label: {\n                Image(systemName: "slider.horizontal.3")\n            }\n        }'
          new_btn = '            Button {\n                Task {\n                    toggleEditChat = true\n                    editChatDialog = true\n                }\n            } label: {\n                Image(systemName: "slider.horizontal.3")\n            }\n            Button {\n                showVoiceChat = true\n            } label: {\n                Image(systemName: "mic.fill")\n            }\n            .disabled(aiChatModel.predicting)\n        }'
          content = content.replace(old_btn, new_btn)

          content = content.replace(
              '.sheet(isPresented: $toggleEditChat)',
              '.fullScreenCover(isPresented: $showVoiceChat) {\n            VoiceChatView()\n                .environmentObject(aiChatModel)\n        }\n        .sheet(isPresented: $toggleEditChat)'
          )

          with open('LLMFarm/Chats/ChatView.swift', 'w') as f:
              f.write(content)
          print('ChatView patched')
          EOF

      - name: Build archive
        run: |
          xcodebuild archive \
            -project LLMFarm.xcodeproj \
            -scheme LLMFarm_Release \
            -configuration Release \
            -archivePath ./build/LLMFarm.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO

      - name: Package IPA
        run: |
          mkdir -p ./build/Payload
          cp -r ./build/LLMFarm.xcarchive/Products/Applications/LLMFarm.app ./build/Payload/
          cd ./build
          zip -r LLMFarm.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLMFarm-IPA
          path: ./build/LLMFarm.ipa
