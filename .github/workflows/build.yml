name: Build IPA

"on":
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build llama.xcframework
        run: |
          cp build-xcframework_cpu.sh llmfarm_core.swift/llama.cpp/
          cd llmfarm_core.swift/llama.cpp
          chmod +x build-xcframework_cpu.sh
          bash build-xcframework_cpu.sh

      - name: Fix LLMFarmShortcuts
        run: |
          cat > LLMFarm/Intents/LLMFarmShortcuts.swift << 'EOF'
          import AppIntents

          struct LLMFarmShortcuts: AppShortcutsProvider {
              static var appShortcuts: [AppShortcut] {
                  return [AppShortcut]()
              }
          }
          EOF

      - name: Patch - remove ExtractAppIntentsMetadata
        run: |
          python3 << 'EOF'
          import re, glob

          for pbxproj in glob.glob('**/*.xcodeproj/project.pbxproj', recursive=True):
              with open(pbxproj, 'r') as f:
                  content = f.read()
              keys = re.findall(r'([0-9A-Fa-f]{24}) /\* Extract App Intents Metadata \*/', content)
              for key in keys:
                  content = re.sub(
                      r'\s*' + key + r'\s*/\*\s*Extract App Intents Metadata\s*\*/\s*=\s*\{[^}]*\};',
                      '', content, flags=re.DOTALL)
                  content = re.sub(
                      r'\s*' + key + r'\s*/\*\s*Extract App Intents Metadata\s*\*/\s*,',
                      '', content)
              with open(pbxproj, 'w') as f:
                  f.write(content)
              print(f'{pbxproj}: removed {len(keys)} phase(s)')
          EOF

      - name: Create VoiceChat Swift files
        run: |
          mkdir -p LLMFarm/VoiceChat
          cat > LLMFarm/VoiceChat/VoiceChatManager.swift << 'MGRENDEOF'
          import Foundation
          import Speech
          import AVFoundation

          enum VoicePhase { case idle, listening, thinking, speaking }

          @MainActor
          class VoiceChatManager: NSObject, ObservableObject {
              @Published var phase: VoicePhase = .idle
              @Published var userText = ""
              @Published var aiText = ""
              var sendMessage: ((String) async -> String)?

              private let recognizer = SFSpeechRecognizer(locale: Locale(identifier: "ja-JP"))!
              private var recogRequest: SFSpeechAudioBufferRecognitionRequest?
              private var recogTask: SFSpeechRecognitionTask?
              private let engine = AVAudioEngine()
              private let synth = AVSpeechSynthesizer()
              private var silenceTimer: Timer?

              override init() {
                  super.init()
                  synth.delegate = self
              }

              func start() {
                  SFSpeechRecognizer.requestAuthorization { _ in
                      AVAudioSession.sharedInstance().requestRecordPermission { granted in
                          guard granted else { return }
                          Task { @MainActor [weak self] in self?.startListening() }
                      }
                  }
              }

              func startListening() {
                  guard phase != .thinking else { return }
                  phase = .listening
                  userText = ""
                  stopEngine()
                  let session = AVAudioSession.sharedInstance()
                  try? session.setCategory(.record, mode: .measurement, options: .duckOthers)
                  try? session.setActive(true, options: .notifyOthersOnDeactivation)
                  recogRequest = SFSpeechAudioBufferRecognitionRequest()
                  recogRequest?.shouldReportPartialResults = true
                  guard let req = recogRequest else { return }
                  recogTask = recognizer.recognitionTask(with: req) { [weak self] result, _ in
                      guard let result else { return }
                      Task { @MainActor [weak self] in
                          guard let self else { return }
                          self.userText = result.bestTranscription.formattedString
                          self.silenceTimer?.invalidate()
                          self.silenceTimer = Timer.scheduledTimer(
                              withTimeInterval: 1.5, repeats: false) { _ in
                              Task { @MainActor [weak self] in self?.processText() }
                          }
                      }
                  }
                  let node = engine.inputNode
                  let fmt = node.outputFormat(forBus: 0)
                  node.installTap(onBus: 0, bufferSize: 1024, format: fmt) { [weak self] buf, _ in
                      self?.recogRequest?.append(buf)
                  }
                  engine.prepare()
                  try? engine.start()
              }

              private func processText() {
                  let text = userText.trimmingCharacters(in: .whitespacesAndNewlines)
                  guard !text.isEmpty else { startListening(); return }
                  silenceTimer?.invalidate()
                  stopEngine()
                  phase = .thinking
                  Task { [weak self] in
                      guard let self else { return }
                      let reply = await self.sendMessage?(text) ?? ""
                      self.aiText = reply
                      self.speak(reply)
                  }
              }

              private func speak(_ text: String) {
                  phase = .speaking
                  let utt = AVSpeechUtterance(string: text)
                  utt.voice = AVSpeechSynthesisVoice(language: "ja-JP")
                  utt.rate = 0.5
                  let session = AVAudioSession.sharedInstance()
                  try? session.setCategory(.playback, mode: .default
